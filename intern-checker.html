<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>インターン日程バッティングチェッカー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    body { background: #f8fafc; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 読み込み失敗・JSエラー時に真っ白にならないようフォールバック表示 -->
  <noscript><div style="padding:24px;font-family:sans-serif">このページはJavaScriptが必要です。ブラウザの設定をご確認ください。</div></noscript>
  <script>
    // CDN(React/Babel)が読み込めなかった場合に案内を出す
    window.addEventListener("load", function () {
      setTimeout(function () {
        var root = document.getElementById("root");
        var ready = window.React && window.ReactDOM && window.Babel;
        if (root && !root.hasChildNodes()) {
          if (!ready) {
            root.innerHTML = '<div style="padding:24px;max-width:560px;margin:40px auto;font-family:sans-serif;color:#334155">'
              + '<h2 style="font-size:18px;font-weight:700;margin-bottom:8px">読み込みに失敗しました</h2>'
              + '<p style="font-size:14px;line-height:1.7">通信環境により、必要なライブラリ（React / Babel）を読み込めませんでした。'
              + 'Wi-Fiなど安定した回線で、ページを再読み込みしてください。</p></div>';
          }
        }
      }, 6000);
    });
    // 実行時エラーを画面に出す
    window.addEventListener("error", function (ev) {
      var root = document.getElementById("root");
      if (root && !root.hasChildNodes()) {
        root.innerHTML = '<div style="padding:24px;max-width:560px;margin:40px auto;font-family:sans-serif;color:#334155">'
          + '<h2 style="font-size:18px;font-weight:700;margin-bottom:8px">表示エラー</h2>'
          + '<p style="font-size:13px;line-height:1.7;color:#64748b">' + String(ev.message || ev.error || "") + '</p></div>';
      }
    });
  </script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    // ==========================================
    // 定数
    // ==========================================
    const COLOR_PALETTES = [
      { name: "blue",    bg: "bg-blue-500",    text: "text-blue-700",    badge: "bg-blue-50 text-blue-700 border-blue-200" },
      { name: "emerald", bg: "bg-emerald-500", text: "text-emerald-700", badge: "bg-emerald-50 text-emerald-700 border-emerald-200" },
      { name: "violet",  bg: "bg-violet-500",  text: "text-violet-700",  badge: "bg-violet-50 text-violet-700 border-violet-200" },
      { name: "amber",   bg: "bg-amber-500",   text: "text-amber-700",   badge: "bg-amber-50 text-amber-700 border-amber-200" },
      { name: "rose",    bg: "bg-rose-500",    text: "text-rose-700",    badge: "bg-rose-50 text-rose-700 border-rose-200" },
      { name: "indigo",  bg: "bg-indigo-500",  text: "text-indigo-700",  badge: "bg-indigo-50 text-indigo-700 border-indigo-200" },
    ];

    // 対象期間: 2026年6月 〜 2027年6月
    const START_YEAR = 2026, START_MONTH = 6;
    const END_YEAR = 2027, END_MONTH = 6;

    // 表示対象の {year, month} の並び（2026/6 … 2027/6）
    const MONTH_SEQUENCE = (() => {
      const list = [];
      let y = START_YEAR, m = START_MONTH;
      while (y < END_YEAR || (y === END_YEAR && m <= END_MONTH)) {
        list.push({ year: y, month: m });
        m++; if (m > 12) { m = 1; y++; }
      }
      return list;
    })();

    // 年が省略されたときの推定（6〜12月→2026年、1〜5月→2027年）
    function inferYear(month) {
      return month >= START_MONTH ? START_YEAR : END_YEAR;
    }

    const WEEKDAYS = ["日", "月", "火", "水", "木", "金", "土"];

    // ==========================================
    // SVG アイコン
    // ==========================================
    const IconCalendar = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>
      </svg>
    );
    const IconClipboard = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
      </svg>
    );
    const IconPlus = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M5 12h14"/><path d="M12 5v14"/>
      </svg>
    );
    const IconEye = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    );
    const IconEyeOff = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><path d="m2 2 20 20"/>
      </svg>
    );
    const IconTrash = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
    );
    const IconAlert = () => (
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>
      </svg>
    );

    // ==========================================
    // ユーティリティ
    // ==========================================
    function createDateObj(year, month, day) {
      // 後方互換: 旧データは (month, day) で呼ばれていたため引数2つなら年を推定
      if (day === undefined) { day = month; month = year; year = inferYear(month); }
      const mm = String(month).padStart(2, "0");
      const dd = String(day).padStart(2, "0");
      return { year, month, day, formatted: `${year}-${mm}-${dd}` };
    }

    function normalize(s) {
      return String(s)
        .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
        .replace(/／/g, "/")
        .replace(/[〜～]/g, "~")
        .replace(/[－ー―–—]/g, "-")
        .replace(/　/g, " ");
    }

    function parseDatesFromText(text) {
      const dates = [];
      let cleanText = normalize(text);

      // 曜日表記を除去（数字の誤認防止）
      cleanText = cleanText.replace(/[(（][日一月火水木金土][)）]/g, "");

      const seen = new Set();
      // 年は省略時に推定。範囲展開では Date から年が決まる
      const push = (month, day, year) => {
        month = +month; day = +day;
        if (!month || !day || month < 1 || month > 12 || day < 1 || day > 31) return;
        year = year || inferYear(month);
        const k = year + "-" + month + "-" + day;
        if (seen.has(k)) return;
        seen.add(k);
        dates.push(createDateObj(year, month, day));
      };
      const pushRange = (y1, m1, d1, y2, m2, d2) => {
        if (m1 < 1 || m1 > 12 || m2 < 1 || m2 > 12) return;
        const start = new Date(y1, m1 - 1, d1);
        const end = new Date(y2, m2 - 1, d2);
        if (isNaN(start) || isNaN(end) || end < start) return;
        let guard = 0;
        for (let dt = new Date(start); dt <= end && guard < 400; dt.setDate(dt.getDate() + 1), guard++) {
          push(dt.getMonth() + 1, dt.getDate(), dt.getFullYear());
        }
      };

      // 中点・読点区切りの複数日「9月3日・4日」「2026年9月16日・17・18日」（同一月内）
      cleanText = cleanText.replace(
        /(?:(20\d{2})\s*年\s*)?(\d{1,2})\s*月\s*(\d{1,2})\s*日?((?:\s*[・,、]\s*\d{1,2}(?!\s*月)\s*日?)+)/g,
        (_, y, m, d1, rest) => {
          const year = y ? +y : inferYear(+m);
          push(+m, +d1, year);
          rest.replace(/(\d{1,2})/g, (__, dd) => { push(+m, +dd, year); return ""; });
          return " ";
        });

      // 年付き単発「2027/3/1」「2027年3月1日」
      cleanText = cleanText.replace(/(20\d{2})\s*[\/年]\s*(\d{1,2})\s*[\/月]\s*(\d{1,2})\s*日?/g,
        (_, y, a, b) => { push(+a, +b, +y); return " "; });

      // 月またぎ期間「7/30~8/3」「7月30日〜8月3日」（年は各月から推定）
      cleanText = cleanText.replace(/(\d{1,2})\s*(?:\/|月)\s*(\d{1,2})\s*日?\s*[~\-]\s*(\d{1,2})\s*(?:\/|月)\s*(\d{1,2})\s*日?/g,
        (_, a, b, c, d) => { pushRange(inferYear(+a), +a, +b, inferYear(+c), +c, +d); return " "; });

      // 同一月内の期間「7/24~30」「8月1日〜5日」
      cleanText = cleanText.replace(/(\d{1,2})\s*(?:\/|月)\s*(\d{1,2})\s*日?\s*[~\-]\s*(\d{1,2})\s*日?/g,
        (_, a, b, c) => { const y = inferYear(+a); pushRange(y, +a, +b, y, +a, +c); return " "; });

      // 単発「7月21日」
      cleanText = cleanText.replace(/(\d{1,2})\s*月\s*(\d{1,2})\s*日/g,
        (_, a, b) => { push(+a, +b); return " "; });

      // 単発「8/4」（後読みは古いSafariで非対応のため使わない）
      cleanText = cleanText.replace(/(\d{1,2})\s*\/\s*(\d{1,2})/g,
        (_, a, b) => { push(+a, +b); return " "; });

      return dates.sort((a, b) => (a.year - b.year) || (a.month - b.month) || (a.day - b.day));
    }

    function guessName(text) {
      const line = text.split(/\r?\n/).map(l => l.trim()).find(l => l.length > 0) || "";
      const before = line.split(/(\d{1,2}\s*月|\d{1,2}\s*\/)/)[0].trim();
      return (before || line).replace(/[、,：:].*/, "").trim().slice(0, 20);
    }

    function uid() {
      return (typeof crypto !== "undefined" && crypto.randomUUID)
        ? crypto.randomUUID()
        : Date.now() + "-" + Math.random().toString(36).slice(2);
    }

    // ==========================================
    // メインコンポーネント
    // ==========================================
    function InternScheduler() {
      const [schedules, setSchedules] = useState([]);
      const [companyInput, setCompanyInput] = useState("");
      const [textInput, setTextInput] = useState("");
      const [currentYear, setCurrentYear] = useState(START_YEAR);
      const [currentMonth, setCurrentMonth] = useState(START_MONTH);
      const [isMounted, setIsMounted] = useState(false);

      const goToYM = (year, month) => { setCurrentYear(year); setCurrentMonth(month); };

      useEffect(() => {
        setIsMounted(true);
        try {
          const saved = localStorage.getItem("intern_schedules_v2");
          if (saved) {
            // 旧データ（year欄なし）を formatted から補完
            const parsed = JSON.parse(saved).map(s => ({
              ...s,
              dates: (s.dates || []).map(d => {
                if (d.year) return d;
                const y = d.formatted ? parseInt(d.formatted.slice(0, 4), 10) : inferYear(d.month);
                return { ...d, year: y };
              }),
            }));
            setSchedules(parsed);
          }
        } catch (e) {}
      }, []);

      useEffect(() => {
        if (isMounted) {
          try { localStorage.setItem("intern_schedules_v2", JSON.stringify(schedules)); } catch (e) {}
        }
      }, [schedules, isMounted]);

      // テキスト1行目から企業名を推測
      useEffect(() => {
        if (textInput.trim() && !companyInput) {
          const guessed = guessName(textInput);
          if (guessed) setCompanyInput(guessed);
        }
      }, [textInput]);

      const handleAddSchedule = (e) => {
        e.preventDefault();
        if (!textInput.trim()) return;

        const finalName = companyInput.trim() || `企業 ${schedules.length + 1}`;
        const extractedDates = parseDatesFromText(textInput);

        if (extractedDates.length === 0) {
          alert("日付が検出されませんでした。「7月21日」「8/4」「7/24~30」などの形式で入力してください。");
          return;
        }

        const usedColors = schedules.map(s => s.color);
        const color = COLOR_PALETTES.find(p => !usedColors.includes(p.name)) || COLOR_PALETTES[schedules.length % COLOR_PALETTES.length];

        setSchedules(prev => [...prev, {
          id: uid(),
          name: finalName,
          rawText: textInput,
          dates: extractedDates,
          color: color.name,
          visible: true,
        }]);
        setCompanyInput("");
        setTextInput("");
        if (extractedDates.length > 0) goToYM(extractedDates[0].year, extractedDates[0].month);
      };

      const toggleVisibility = (id) =>
        setSchedules(prev => prev.map(s => s.id === id ? { ...s, visible: !s.visible } : s));

      const deleteSchedule = (id) =>
        setSchedules(prev => prev.filter(s => s.id !== id));

      // 個別の日付を削除（削除後に日程が0件になった企業は自動で除去）
      const deleteDate = (id, formatted) =>
        setSchedules(prev => prev
          .map(s => s.id === id ? { ...s, dates: s.dates.filter(d => d.formatted !== formatted) } : s)
          .filter(s => s.dates.length > 0));

      // デモデータ
      const loadDemoData = () => {
        setSchedules([
          { id: "demo-1", name: "関西電力", rawText: "", dates: [createDateObj(2026,7,21), createDateObj(2026,8,4), createDateObj(2026,9,8)], color: "blue", visible: true },
          { id: "demo-2", name: "A社(5days)", rawText: "", dates: [createDateObj(2026,7,28), createDateObj(2026,7,29), createDateObj(2026,7,30), createDateObj(2026,7,31), createDateObj(2026,8,1)], color: "emerald", visible: true },
          { id: "demo-3", name: "サイバー系B社", rawText: "", dates: [createDateObj(2026,7,30), createDateObj(2026,8,4), createDateObj(2027,3,1)], color: "violet", visible: true },
        ]);
        goToYM(2026, 7);
      };

      // カレンダー計算
      const firstDayOfWeek = new Date(currentYear, currentMonth - 1, 1).getDay();
      const totalDays = new Date(currentYear, currentMonth, 0).getDate();
      const seqIndex = MONTH_SEQUENCE.findIndex(s => s.year === currentYear && s.month === currentMonth);

      const dateMap = {};
      schedules.forEach(comp => {
        if (!comp.visible) return;
        comp.dates.forEach(d => {
          if (!dateMap[d.formatted]) dateMap[d.formatted] = [];
          dateMap[d.formatted].push({ company: comp, date: d });
        });
      });

      if (!isMounted) return <div className="p-8 text-center text-slate-500">Loading…</div>;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800" style={{fontFamily: "system-ui, -apple-system, sans-serif"}}>
          {/* ヘッダー */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10 px-6 py-4 shadow-sm">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
              <div className="flex items-center gap-3">
                <div className="p-2 bg-indigo-600 rounded-lg text-white">
                  <IconCalendar />
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight text-slate-900">インターン日程バッティングチェッカー</h1>
                  <p className="text-xs text-slate-500 font-medium">複数企業の候補日テキストを一括抽出・重複可視化 (2026年6月〜2027年6月)</p>
                </div>
              </div>
              {schedules.length === 0 && (
                <button
                  onClick={loadDemoData}
                  className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-2 rounded-md font-medium border border-slate-200 transition"
                >
                  💡 デモデータを読み込む
                </button>
              )}
            </div>
          </header>

          <main className="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6">

            {/* 左サイドバー */}
            <div className="lg:col-span-4 flex flex-col gap-6">

              {/* 入力フォーム */}
              <section className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <h2 className="text-sm font-semibold text-slate-900 mb-3 flex items-center gap-2">
                  <span className="text-indigo-500"><IconClipboard /></span>
                  募集テキストから日程を抽出
                </h2>
                <form onSubmit={handleAddSchedule} className="space-y-4">
                  <div>
                    <label className="block text-xs font-medium text-slate-500 mb-1">企業名・イベント名（任意）</label>
                    <input
                      type="text"
                      placeholder="例: 関西電力 (空欄なら1行目を自動判定)"
                      value={companyInput}
                      onChange={(e) => setCompanyInput(e.target.value)}
                      className="w-full text-sm px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-medium text-slate-500 mb-1">案内テキスト（ここにペースト）</label>
                    <textarea
                      rows={5}
                      required
                      placeholder={"例：\n第1回:7月24日〜30日\n月またぎの 7/30~8/3 も自動展開します！\nA社 8/4, 8/5, 9/1"}
                      value={textInput}
                      onChange={(e) => setTextInput(e.target.value)}
                      className="w-full text-sm px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50 font-mono resize-y"
                    />
                  </div>
                  {/* プレビュー */}
                  {textInput.trim() && (() => {
                    const preview = parseDatesFromText(textInput);
                    return (
                      <div className="rounded-lg bg-slate-50 border border-slate-200 p-3">
                        <div className="text-xs font-semibold text-slate-500 mb-1.5">
                          ✨ 抽出プレビュー
                          {(companyInput || guessName(textInput)) && (
                            <span className="text-indigo-600"> ／ {companyInput || guessName(textInput)}</span>
                          )}
                        </div>
                        {preview.length === 0
                          ? <p className="text-xs text-slate-400">日付が見つかりません（「7月21日」や「8/4」「7/24~26」の形式で入力してください）</p>
                          : <div className="flex flex-wrap gap-1">
                              {preview.map((d, i) => (
                                <span key={i} className="text-xs px-2 py-0.5 rounded bg-white border border-slate-200 font-mono text-slate-700">
                                  {d.month}/{d.day}
                                </span>
                              ))}
                            </div>
                        }
                      </div>
                    );
                  })()}
                  <button
                    type="submit"
                    className="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm py-2 px-4 rounded-lg shadow-sm transition"
                  >
                    <IconPlus />
                    日程を解析して追加
                    {textInput.trim() && parseDatesFromText(textInput).length > 0 &&
                      <span className="text-indigo-200 text-xs">（{parseDatesFromText(textInput).length}件）</span>
                    }
                  </button>
                </form>
              </section>

              {/* 登録済み一覧 */}
              <section className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex-1">
                <h2 className="text-sm font-semibold text-slate-900 mb-3 flex items-center justify-between">
                  <span>登録済みのターゲット ({schedules.length})</span>
                  {schedules.length > 0 && (
                    <button onClick={() => setSchedules([])} className="text-xs text-rose-500 hover:underline">すべてクリア</button>
                  )}
                </h2>

                {schedules.length === 0 ? (
                  <div className="text-center py-8 text-slate-400 border border-dashed border-slate-200 rounded-lg bg-slate-50">
                    <p className="text-xs">登録されたインターン情報はありません。</p>
                  </div>
                ) : (
                  <div className="space-y-2.5 max-h-96 overflow-y-auto pr-1 custom-scrollbar">
                    {schedules.map((comp) => {
                      const palette = COLOR_PALETTES.find(p => p.name === comp.color) || COLOR_PALETTES[0];
                      return (
                        <div
                          key={comp.id}
                          className={`p-3 border rounded-lg flex items-start justify-between transition-all ${
                            comp.visible ? "bg-white border-slate-200" : "bg-slate-50 border-slate-100 opacity-60"
                          }`}
                        >
                          <div className="flex gap-2.5 items-start">
                            <span className={`w-3 h-3 rounded-full mt-1.5 shrink-0 ${palette.bg}`} />
                            <div>
                              <h3 className="text-sm font-bold text-slate-800 line-clamp-1">{comp.name}</h3>
                              <div className="flex flex-wrap gap-1 mt-1.5">
                                {comp.dates.map((d, idx) => (
                                  <button
                                    key={idx}
                                    type="button"
                                    onClick={() => deleteDate(comp.id, d.formatted)}
                                    title={`${d.year}/${d.month}/${d.day} を削除`}
                                    className={`group/chip flex items-center gap-0.5 text-[10px] px-1.5 py-0.5 rounded font-mono border transition hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 ${palette.badge}`}
                                  >
                                    {d.year !== START_YEAR && <span className="opacity-60">'{String(d.year).slice(2)}</span>}
                                    {d.month}/{d.day}
                                    <span className="font-bold text-slate-400 group-hover/chip:text-rose-500">×</span>
                                  </button>
                                ))}
                              </div>
                              <p className="text-[10px] text-slate-400 mt-1">日付をタップで個別削除</p>
                            </div>
                          </div>
                          <div className="flex items-center gap-1 shrink-0 ml-2">
                            <button onClick={() => toggleVisibility(comp.id)} className="p-1 text-slate-400 hover:text-slate-600 rounded transition">
                              {comp.visible ? <IconEye /> : <IconEyeOff />}
                            </button>
                            <button onClick={() => deleteSchedule(comp.id)} className="p-1 text-slate-400 hover:text-rose-600 rounded transition">
                              <IconTrash />
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </section>
            </div>

            {/* カレンダー */}
            <div className="lg:col-span-8 bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col">
              <div className="flex flex-col gap-4 mb-6 pb-4 border-b border-slate-100">
                <div className="flex items-center justify-between gap-2">
                  <div className="flex items-center gap-2">
                    <span className="text-xl font-extrabold text-slate-900 font-mono">{currentYear}年</span>
                    <span className="text-2xl font-black text-indigo-600 font-mono">{currentMonth}月</span>
                  </div>
                  <div className="flex items-center gap-1">
                    <button
                      type="button"
                      disabled={seqIndex <= 0}
                      onClick={() => { const p = MONTH_SEQUENCE[seqIndex - 1]; if (p) goToYM(p.year, p.month); }}
                      className="px-2.5 py-1 text-sm font-bold rounded-md border border-slate-200 text-slate-600 hover:bg-slate-50 disabled:opacity-30 disabled:cursor-not-allowed"
                    >‹ 前月</button>
                    <button
                      type="button"
                      disabled={seqIndex >= MONTH_SEQUENCE.length - 1}
                      onClick={() => { const n = MONTH_SEQUENCE[seqIndex + 1]; if (n) goToYM(n.year, n.month); }}
                      className="px-2.5 py-1 text-sm font-bold rounded-md border border-slate-200 text-slate-600 hover:bg-slate-50 disabled:opacity-30 disabled:cursor-not-allowed"
                    >翌月 ›</button>
                  </div>
                </div>
                <div className="flex flex-wrap gap-1 bg-slate-100 p-1 rounded-lg">
                  {MONTH_SEQUENCE.map(({ year, month }) => {
                    const active = year === currentYear && month === currentMonth;
                    return (
                      <button
                        key={`${year}-${month}`}
                        onClick={() => goToYM(year, month)}
                        title={`${year}年${month}月`}
                        className={`px-2.5 py-1 text-xs font-bold rounded-md font-mono transition-all ${
                          active ? "bg-white text-indigo-600 shadow-sm" : "text-slate-600 hover:text-slate-900"
                        }`}
                      >
                        <span className="opacity-50">'{String(year).slice(2)}</span>{month}月
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="grid grid-cols-7 gap-1.5 flex-1" style={{minHeight: "480px"}}>
                {WEEKDAYS.map((day, idx) => (
                  <div key={idx} className={`text-center text-xs font-bold py-2 rounded bg-slate-50 border border-slate-100 ${
                    idx === 0 ? "text-rose-500" : idx === 6 ? "text-blue-500" : "text-slate-500"
                  }`}>
                    {day}
                  </div>
                ))}

                {Array.from({ length: firstDayOfWeek }).map((_, idx) => (
                  <div key={`empty-${idx}`} className="bg-slate-50 rounded-lg border border-slate-100 min-h-[70px]" />
                ))}

                {Array.from({ length: totalDays }).map((_, idx) => {
                  const dayNum = idx + 1;
                  const mm = String(currentMonth).padStart(2, "0");
                  const dd = String(dayNum).padStart(2, "0");
                  const dateStr = `${currentYear}-${mm}-${dd}`;
                  const dayEvents = dateMap[dateStr] || [];
                  const eventCount = dayEvents.length;
                  const isConflict = eventCount >= 2;

                  let cellBg = "bg-white hover:bg-slate-50";
                  let cellBorder = "border-slate-200";
                  if (isConflict) {
                    cellBg = eventCount === 2 ? "bg-rose-50" : "bg-rose-100";
                    cellBorder = "border-rose-300 ring-1 ring-rose-200";
                  }

                  return (
                    <div key={`day-${dayNum}`} className={`p-1.5 border rounded-lg flex flex-col justify-between transition-all min-h-[75px] ${cellBg} ${cellBorder}`}>
                      <div className="flex justify-between items-center mb-1">
                        <span className={`text-xs font-bold font-mono ${isConflict ? "text-rose-700" : "text-slate-700"}`}>{dayNum}</span>
                        {isConflict && (
                          <span className={`text-[9px] px-1 rounded font-black flex items-center gap-0.5 tracking-tight ${
                            eventCount === 2 ? "bg-rose-200 text-rose-800" : "bg-rose-600 text-white"
                          }`}>
                            <IconAlert />{eventCount}社重複
                          </span>
                        )}
                      </div>
                      <div className="space-y-0.5 overflow-y-auto max-h-[50px] custom-scrollbar">
                        {dayEvents.map((ev, eIdx) => {
                          const palette = COLOR_PALETTES.find(p => p.name === ev.company.color) || COLOR_PALETTES[0];
                          return (
                            <div
                              key={eIdx}
                              className={`text-[10px] px-1 py-0.5 rounded font-medium truncate border ${palette.badge}`}
                              title={ev.company.name}
                            >
                              {ev.company.name}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="mt-4 pt-3 border-t border-slate-100 flex flex-wrap gap-4 text-xs text-slate-500">
                <div className="flex items-center gap-1.5"><span className="w-3 h-3 bg-white border border-slate-200 rounded inline-block" /><span>予定なし / 1社のみ</span></div>
                <div className="flex items-center gap-1.5"><span className="w-3 h-3 bg-rose-50 border border-rose-300 rounded inline-block" /><span>⚠️ 2社重複 (要注意)</span></div>
                <div className="flex items-center gap-1.5"><span className="w-3 h-3 bg-rose-100 border border-rose-400 rounded inline-block" /><span>🚨 3社以上重複 (激戦区)</span></div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    try {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<InternScheduler />);
    } catch (err) {
      document.getElementById("root").innerHTML =
        '<div style="padding:24px;max-width:560px;margin:40px auto;font-family:sans-serif;color:#334155">'
        + '<h2 style="font-size:18px;font-weight:700;margin-bottom:8px">表示エラー</h2>'
        + '<p style="font-size:13px;color:#64748b">' + String(err && err.message ? err.message : err) + '</p></div>';
    }
  </script>
</body>
</html>
